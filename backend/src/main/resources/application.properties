spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/knowflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME:knowflow_user}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis-plus.configuration.map-underscore-to-camel-case=true


# DeepSeek AI 配置：API Key 只从本机环境变量读取。
ai.deepseek.api-key=${DEEPSEEK_API_KEY}
ai.deepseek.base-url=https://api.deepseek.com
ai.deepseek.model=deepseek-v4-flash